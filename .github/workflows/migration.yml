name: Run Migrations

on:
  schedule:
    - cron: '0 5 * * *'   # 5 AM UTC daily — cleanup before morning scrape
  workflow_dispatch:

jobs:
  migration:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Update CA certificates
        run: sudo apt-get update && sudo apt-get install -y ca-certificates

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r Project/requirements.txt
          pip install --upgrade pymongo

      - name: Run derStandard cleanup migration
        env:
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
        run: |
          python Project/cleanup_derstandard_issues.py

      - name: Run garbage listing cleanup
        env:
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
        run: |
          python Project/scripts/cleanup_empty_titles.py --confirm
