name: Run ImmoAgent

on:
  schedule:
    - cron: '0 6 * * 1-5'   # 6 AM UTC  (8 AM Vienna) — morning batch
    - cron: '0 11 * * 1-5'  # 11 AM UTC (1 PM Vienna) — midday batch
    - cron: '0 15 * * 1-5'  # 3 PM UTC  (5 PM Vienna) — afternoon batch
    - cron: '0 18 * * 1-5'  # 6 PM UTC  (8 PM Vienna) — evening batch
    - cron: '0 9 * * 6'     # 9 AM UTC  Saturday only  — weekend sweep
  workflow_dispatch:     # allows manual triggering

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Update CA certificates
        run: sudo apt-get update && sudo apt-get install -y ca-certificates

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r Project/requirements.txt
          pip install --upgrade pymongo

      - name: Scrape listings
        run: python Project/run.py
        env:
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
          TELEGRAM_MAIN_BOT_TOKEN: ${{ secrets.TELEGRAM_MAIN_BOT_TOKEN }}
          TELEGRAM_MAIN_CHAT_ID: ${{ secrets.TELEGRAM_MAIN_CHAT_ID }}
          TELEGRAM_BOT_VIENNA_TOKEN: ${{ secrets.TELEGRAM_BOT_VIENNA_TOKEN }}
          TELEGRAM_BOT_VIENNA_CHAT_ID: ${{ secrets.TELEGRAM_BOT_VIENNA_CHAT_ID }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}

  top5:
    runs-on: ubuntu-latest
    needs: scrape

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r Project/requirements.txt

      - name: Send top 5 report
        run: python Project/run_top5.py --exclude-district 1100 --exclude-district 1160 --exclude-district 1210 --exclude-district 1220
        env:
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
          TELEGRAM_MAIN_BOT_TOKEN: ${{ secrets.TELEGRAM_MAIN_BOT_TOKEN }}
          TELEGRAM_MAIN_CHAT_ID: ${{ secrets.TELEGRAM_MAIN_CHAT_ID }}

      - name: Send bank loan ready report
        run: python Project/run_top5.py --buyer-profile=bank_loan_ready --exclude-district 1100 --exclude-district 1160 --exclude-district 1210 --exclude-district 1220
        env:
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
          TELEGRAM_MAIN_BOT_TOKEN: ${{ secrets.TELEGRAM_MAIN_BOT_TOKEN }}
          TELEGRAM_MAIN_CHAT_ID: ${{ secrets.TELEGRAM_MAIN_CHAT_ID }}

