name: coop-fast-poll
on:
  schedule:
    - cron: "*/5 6-20 * * 1-6"   # every 5 min, ~08:00–22:00 Vienna, Mon–Sat
  workflow_dispatch: {}
concurrency:
  group: coop-fast-poll
  cancel-in-progress: true       # a slow run must not stack on the next tick
jobs:
  poll:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - name: Warn if TELEGRAM_COOP_CHANNEL_ID secret is missing
        env:
          COOP_ID: ${{ secrets.TELEGRAM_COOP_CHANNEL_ID }}
        run: |
          if [ -z "$COOP_ID" ]; then
            # Non-fatal: the scrape + Mongo upserts that feed the /coop website must
            # run regardless. run_coop.py already logs loudly and continues without a
            # channel (alerts DISABLED, polling/upserts continue). A hard `exit 1` here
            # killed the whole poll job — so no units were scraped and the strict
            # buyable:false /coop page (which hides legacy rows) stayed empty.
            echo "::warning::TELEGRAM_COOP_CHANNEL_ID repo secret is missing — Telegram co-op alerts are disabled, but scraping/upserts (website data) still run. Add it under Settings → Secrets to enable alerts."
          fi
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: Project/requirements-coop.txt
      - run: pip install -r Project/requirements-coop.txt
      - name: Fast co-op poll → Telegram
        working-directory: Project
        env:
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
          TELEGRAM_MAIN_BOT_TOKEN: ${{ secrets.TELEGRAM_MAIN_BOT_TOKEN }}
          TELEGRAM_COOP_CHANNEL_ID: ${{ secrets.TELEGRAM_COOP_CHANNEL_ID }}
          # Operator-supplied mygewo filter URL. Set repo variable MYGEWO_SEARCH_URL
          # (Settings → Secrets and variables → Actions → Variables) to change filters;
          # empty/unset falls back to the baked default (≥3 rm · ≥51 m² · rent <€1000 · Wien).
          MYGEWO_SEARCH_URL: ${{ vars.MYGEWO_SEARCH_URL }}
        run: python run_coop.py
